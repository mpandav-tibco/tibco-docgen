<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Bright background — visible in both dark and light VS Code themes -->
  <rect width="128" height="128" rx="18" fill="#1565C0"/>
  <!-- Document card -->
  <rect x="22" y="18" width="84" height="98" rx="8" fill="#ffffff"/>
  <!-- Dog-ear fold -->
  <polygon points="82,18 106,42 82,42" fill="#BBDEFB"/>
  <polygon points="82,18 106,42 82,18" fill="#1565C0" opacity="0.25"/>
  <!-- Content lines -->
  <rect x="32" y="54" width="52" height="5" rx="2.5" fill="#1565C0"/>
  <rect x="32" y="65" width="44" height="4" rx="2" fill="#90CAF9"/>
  <rect x="32" y="75" width="48" height="4" rx="2" fill="#90CAF9"/>
  <rect x="32" y="85" width="36" height="4" rx="2" fill="#90CAF9"/>
  <!-- Orange badge — "D" for DocGen -->
  <circle cx="90" cy="96" r="18" fill="#FF6F00"/>
  <text x="90" y="103" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="bold" fill="white">D</text>
</svg>
